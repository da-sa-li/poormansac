name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python3 -m py_compile custom_components/poormansac/*.py
      - run: pytest -q
